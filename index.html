<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMX 模型编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="toolbar">
            <div class="toolbar-left">
                <h1>PMX Editor</h1>
                <button id="btn-open" class="btn btn-primary" data-i18n="toolbar.openFolder">📂 打开文件夹</button>
                <button id="btn-save" class="btn btn-success" disabled data-i18n="toolbar.save">💾 保存</button>
                <input type="file" id="file-input" accept=".pmx" hidden>
                <input type="file" id="folder-input" webkitdirectory directory multiple hidden>
            </div>
            <div class="toolbar-right">
                <span id="file-name" class="file-info" data-i18n="toolbar.noFile">未加载文件</span>
                <a href="help.html" target="_blank" class="btn btn-small" id="btn-help" title="帮助">❓</a>
                <div class="lang-switcher">
                    <button id="btn-lang-zh" class="btn btn-lang active">中文</button>
                    <button id="btn-lang-en" class="btn btn-lang">EN</button>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <nav class="nav-tabs">
                    <button class="tab active" data-panel="info" data-i18n="tab.info">📋 信息</button>
                    <button class="tab" data-panel="vertices" data-i18n="tab.vertices">📐 顶点</button>
                    <button class="tab" data-panel="materials" data-i18n="tab.materials">🎨 材质</button>
                    <button class="tab" data-panel="bones" data-i18n="tab.bones">🦴 骨骼</button>
                    <button class="tab" data-panel="morphs" data-i18n="tab.morphs">😊 表情</button>
                    <button class="tab" data-panel="rigidbodies" data-i18n="tab.rigidbodies">⚙️ 刚体</button>
                    <button class="tab" data-panel="joints" data-i18n="tab.joints">🔗 关节</button>
                </nav>

                <div class="panel-content">
                    <!-- Info Panel -->
                    <div id="panel-info" class="panel active">
                        <div class="panel-section">
                            <h3 data-i18n="info.title">模型信息</h3>
                            <div class="form-group">
                                <label data-i18n="info.nameLocal">名称 (日文)</label>
                                <input type="text" id="model-name-local" disabled>
                            </div>
                            <div class="form-group">
                                <label data-i18n="info.nameUniversal">名称 (英文)</label>
                                <input type="text" id="model-name-universal" disabled>
                            </div>
                            <div class="form-group">
                                <label data-i18n="info.commentLocal">注释 (日文)</label>
                                <textarea id="model-comment-local" rows="3" disabled></textarea>
                            </div>
                            <div class="form-group">
                                <label data-i18n="info.commentUniversal">注释 (英文)</label>
                                <textarea id="model-comment-universal" rows="3" disabled></textarea>
                            </div>
                        </div>
                        <div class="panel-section">
                            <h3 data-i18n="info.stats">文件统计</h3>
                            <div class="stats-grid" id="stats-grid">
                                <div class="stat-item"><span class="stat-label" data-i18n="info.version">版本</span><span class="stat-value" id="stat-version">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.encoding">编码</span><span class="stat-value" id="stat-encoding">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.vertexCount">顶点数</span><span class="stat-value" id="stat-vertices">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.surfaceCount">面数</span><span class="stat-value" id="stat-surfaces">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.materialCount">材质数</span><span class="stat-value" id="stat-materials">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.boneCount">骨骼数</span><span class="stat-value" id="stat-bones">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.morphCount">表情数</span><span class="stat-value" id="stat-morphs">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.rigidbodyCount">刚体数</span><span class="stat-value" id="stat-rigidbodies">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.jointCount">关节数</span><span class="stat-value" id="stat-joints">-</span></div>
                                <div class="stat-item"><span class="stat-label" data-i18n="info.textureCount">纹理数</span><span class="stat-value" id="stat-textures">-</span></div>
                            </div>
                        </div>
                    </div>

                    <!-- Vertices Panel -->
                    <div id="panel-vertices" class="panel">
                        <div class="panel-section">
                            <h3 data-i18n="vertices.title">顶点列表</h3>
                            <div class="list-controls">
                                <input type="text" id="vertex-search" data-i18n-placeholder="vertices.search" placeholder="搜索顶点索引...">
                                <span id="vertex-count" class="count-badge">0</span>
                            </div>
                            <div class="virtual-list" id="vertex-list"></div>
                        </div>
                        <div class="panel-section" id="vertex-detail" style="display:none;">
                            <h3><span data-i18n="vertices.detail">顶点详情</span> #<span id="vertex-index">0</span></h3>
                            <div class="form-group">
                                <label data-i18n="vertices.position">位置 (X, Y, Z)</label>
                                <div class="vec3-input">
                                    <input type="number" step="0.001" id="vertex-pos-x">
                                    <input type="number" step="0.001" id="vertex-pos-y">
                                    <input type="number" step="0.001" id="vertex-pos-z">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="vertices.normal">法线 (X, Y, Z)</label>
                                <div class="vec3-input">
                                    <input type="number" step="0.001" id="vertex-normal-x">
                                    <input type="number" step="0.001" id="vertex-normal-y">
                                    <input type="number" step="0.001" id="vertex-normal-z">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="vertices.uv">UV (U, V)</label>
                                <div class="vec2-input">
                                    <input type="number" step="0.001" id="vertex-uv-u">
                                    <input type="number" step="0.001" id="vertex-uv-v">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="vertices.edgeScale">边缘缩放</label>
                                <input type="number" step="0.01" id="vertex-edge-scale">
                            </div>
                        </div>
                    </div>

                    <!-- Materials Panel -->
                    <div id="panel-materials" class="panel">
                        <div class="panel-section">
                            <h3 data-i18n="materials.title">材质列表</h3>
                            <div class="list-controls">
                                <input type="text" id="material-search" data-i18n-placeholder="materials.search" placeholder="搜索材质名称...">
                                <span id="material-count" class="count-badge">0</span>
                            </div>
                            <div class="item-list" id="material-list"></div>
                        </div>
                        <div class="panel-section" id="material-detail" style="display:none;">
                            <h3 data-i18n="materials.detail">材质详情</h3>
                            <!-- Texture Section -->
                            <div class="texture-section">
                                <div class="form-group">
                                    <label data-i18n="materials.texture">纹理贴图</label>
                                    <div class="texture-control">
                                        <div class="texture-preview" id="mat-texture-preview">
                                            <span class="texture-placeholder" data-i18n="materials.noTexture">无纹理</span>
                                        </div>
                                        <div class="texture-actions">
                                            <span class="texture-path" id="mat-texture-path" title="">-</span>
                                            <button class="btn btn-small" id="btn-load-texture" data-i18n="materials.loadTexture">📁 加载纹理</button>
                                            <button class="btn btn-small" id="btn-remove-texture" data-i18n="materials.removeTexture">🗑️ 移除</button>
                                            <input type="file" id="texture-file-input" accept="image/*" hidden>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label data-i18n="materials.texturePresets">材质预设</label>
                                    <div class="preset-grid" id="material-preset-grid">
                                        <button class="preset-btn" data-preset="silk" data-i18n="materials.presetSilk">丝绸</button>
                                        <button class="preset-btn" data-preset="denim" data-i18n="materials.presetDenim">牛仔</button>
                                        <button class="preset-btn" data-preset="leather" data-i18n="materials.presetLeather">皮革</button>
                                        <button class="preset-btn" data-preset="cotton" data-i18n="materials.presetCotton">棉布</button>
                                        <button class="preset-btn" data-preset="velvet" data-i18n="materials.presetVelvet">天鹅绒</button>
                                        <button class="preset-btn" data-preset="metal" data-i18n="materials.presetMetal">金属</button>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.nameLocal">名称 (日文)</label>
                                <input type="text" id="mat-name-local">
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.nameUniversal">名称 (英文)</label>
                                <input type="text" id="mat-name-universal">
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.diffuse">漫反射颜色 (RGBA)</label>
                                <div class="color-input">
                                    <input type="color" id="mat-diffuse-color">
                                    <input type="number" step="0.01" min="0" max="1" id="mat-diffuse-alpha" placeholder="A">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.specularColor">高光颜色 (RGB)</label>
                                <input type="color" id="mat-specular-color">
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.specularStrength">高光强度</label>
                                <input type="number" step="0.1" id="mat-specular-strength">
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.ambient">环境光颜色 (RGB)</label>
                                <input type="color" id="mat-ambient-color">
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.edgeColor">边缘颜色</label>
                                <div class="color-input">
                                    <input type="color" id="mat-edge-color">
                                    <input type="number" step="0.01" min="0" max="1" id="mat-edge-alpha" placeholder="A">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.edgeSize">边缘大小</label>
                                <input type="number" step="0.01" id="mat-edge-size">
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.surfaceCount">面数</label>
                                <input type="number" id="mat-surface-count" readonly>
                            </div>
                            <div class="form-group">
                                <label data-i18n="materials.flags">标志</label>
                                <div class="flag-group">
                                    <label><input type="checkbox" id="mat-flag-nocull"> <span data-i18n="materials.flagNoCull">双面</span></label>
                                    <label><input type="checkbox" id="mat-flag-shadow"> <span data-i18n="materials.flagShadow">地面阴影</span></label>
                                    <label><input type="checkbox" id="mat-flag-drawshadow"> <span data-i18n="materials.flagDrawShadow">投射阴影</span></label>
                                    <label><input type="checkbox" id="mat-flag-receiveshadow"> <span data-i18n="materials.flagReceiveShadow">接受阴影</span></label>
                                    <label><input type="checkbox" id="mat-flag-edge"> <span data-i18n="materials.flagEdge">边缘</span></label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bones Panel -->
                    <div id="panel-bones" class="panel">
                        <div class="panel-section">
                            <h3 data-i18n="bones.title">骨骼列表</h3>
                            <div class="list-controls">
                                <input type="text" id="bone-search" data-i18n-placeholder="bones.search" placeholder="搜索骨骼名称...">
                                <span id="bone-count" class="count-badge">0</span>
                            </div>
                            <div class="item-list" id="bone-list"></div>
                        </div>
                        <div class="panel-section" id="bone-detail" style="display:none;">
                            <h3 data-i18n="bones.detail">骨骼详情</h3>
                            <div class="form-group">
                                <label data-i18n="bones.nameLocal">名称 (日文)</label>
                                <input type="text" id="bone-name-local">
                            </div>
                            <div class="form-group">
                                <label data-i18n="bones.nameUniversal">名称 (英文)</label>
                                <input type="text" id="bone-name-universal">
                            </div>
                            <div class="form-group">
                                <label data-i18n="bones.position">位置 (X, Y, Z)</label>
                                <div class="vec3-input">
                                    <input type="number" step="0.001" id="bone-pos-x">
                                    <input type="number" step="0.001" id="bone-pos-y">
                                    <input type="number" step="0.001" id="bone-pos-z">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="bones.parentIndex">父骨骼索引</label>
                                <input type="number" id="bone-parent-index">
                            </div>
                            <div class="form-group">
                                <label data-i18n="bones.layer">层级</label>
                                <input type="number" id="bone-layer">
                            </div>
                            <div class="form-group">
                                <label data-i18n="bones.flags">标志</label>
                                <div class="flag-group">
                                    <label><input type="checkbox" id="bone-flag-indexed-tail"> <span data-i18n="bones.flagIndexedTail">索引尾部</span></label>
                                    <label><input type="checkbox" id="bone-flag-rotatable"> <span data-i18n="bones.flagRotatable">旋转</span></label>
                                    <label><input type="checkbox" id="bone-flag-translatable"> <span data-i18n="bones.flagTranslatable">平移</span></label>
                                    <label><input type="checkbox" id="bone-flag-visible"> <span data-i18n="bones.flagVisible">可见</span></label>
                                    <label><input type="checkbox" id="bone-flag-enabled"> <span data-i18n="bones.flagEnabled">启用</span></label>
                                    <label><input type="checkbox" id="bone-flag-ik"> <span data-i18n="bones.flagIK">IK</span></label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Morphs Panel -->
                    <div id="panel-morphs" class="panel">
                        <div class="panel-section">
                            <h3 data-i18n="morphs.title">表情列表</h3>
                            <div class="list-controls">
                                <input type="text" id="morph-search" data-i18n-placeholder="morphs.search" placeholder="搜索表情名称...">
                                <span id="morph-count" class="count-badge">0</span>
                            </div>
                            <div class="item-list" id="morph-list"></div>
                        </div>
                        <div class="panel-section" id="morph-detail" style="display:none;">
                            <h3 data-i18n="morphs.detail">表情详情</h3>
                            <div class="form-group">
                                <label data-i18n="morphs.nameLocal">名称 (日文)</label>
                                <input type="text" id="morph-name-local">
                            </div>
                            <div class="form-group">
                                <label data-i18n="morphs.nameUniversal">名称 (英文)</label>
                                <input type="text" id="morph-name-universal">
                            </div>
                            <div class="form-group">
                                <label data-i18n="morphs.panelType">面板类型</label>
                                <select id="morph-panel">
                                    <option value="0" data-i18n="morphs.panelSystem">系统保留</option>
                                    <option value="1" data-i18n="morphs.panelEyebrow">眉毛</option>
                                    <option value="2" data-i18n="morphs.panelEye">眼睛</option>
                                    <option value="3" data-i18n="morphs.panelMouth">嘴巴</option>
                                    <option value="4" data-i18n="morphs.panelOther">其他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label data-i18n="morphs.type">类型</label>
                                <input type="text" id="morph-type" readonly>
                            </div>
                            <div class="form-group">
                                <label data-i18n="morphs.offsetCount">偏移数据数量</label>
                                <input type="number" id="morph-offset-count" readonly>
                            </div>
                        </div>
                    </div>

                    <!-- Rigidbodies Panel -->
                    <div id="panel-rigidbodies" class="panel">
                        <div class="panel-section">
                            <h3 data-i18n="rigidbodies.title">刚体列表</h3>
                            <div class="list-controls">
                                <input type="text" id="rigidbody-search" data-i18n-placeholder="rigidbodies.search" placeholder="搜索刚体名称...">
                                <span id="rigidbody-count" class="count-badge">0</span>
                            </div>
                            <div class="item-list" id="rigidbody-list"></div>
                        </div>
                        <div class="panel-section" id="rigidbody-detail" style="display:none;">
                            <h3 data-i18n="rigidbodies.detail">刚体详情</h3>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.nameLocal">名称 (日文)</label>
                                <input type="text" id="rb-name-local">
                            </div>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.nameUniversal">名称 (英文)</label>
                                <input type="text" id="rb-name-universal">
                            </div>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.shape">形状</label>
                                <select id="rb-shape">
                                    <option value="0" data-i18n="rigidbodies.shapeSphere">球体</option>
                                    <option value="1" data-i18n="rigidbodies.shapeBox">方盒</option>
                                    <option value="2" data-i18n="rigidbodies.shapeCapsule">胶囊</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.size">尺寸 (X, Y, Z)</label>
                                <div class="vec3-input">
                                    <input type="number" step="0.001" id="rb-size-x">
                                    <input type="number" step="0.001" id="rb-size-y">
                                    <input type="number" step="0.001" id="rb-size-z">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.position">位置 (X, Y, Z)</label>
                                <div class="vec3-input">
                                    <input type="number" step="0.001" id="rb-pos-x">
                                    <input type="number" step="0.001" id="rb-pos-y">
                                    <input type="number" step="0.001" id="rb-pos-z">
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.mass">质量</label>
                                <input type="number" step="0.01" id="rb-mass">
                            </div>
                            <div class="form-group">
                                <label data-i18n="rigidbodies.physicsMode">物理模式</label>
                                <select id="rb-physics-mode">
                                    <option value="0" data-i18n="rigidbodies.modeFollowBone">跟随骨骼</option>
                                    <option value="1" data-i18n="rigidbodies.modePhysics">物理演算</option>
                                    <option value="2" data-i18n="rigidbodies.modePhysicsBone">物理+骨骼</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Joints Panel -->
                    <div id="panel-joints" class="panel">
                        <div class="panel-section">
                            <h3 data-i18n="joints.title">关节列表</h3>
                            <div class="list-controls">
                                <input type="text" id="joint-search" data-i18n-placeholder="joints.search" placeholder="搜索关节名称...">
                                <span id="joint-count" class="count-badge">0</span>
                            </div>
                            <div class="item-list" id="joint-list"></div>
                        </div>
                        <div class="panel-section" id="joint-detail" style="display:none;">
                            <h3 data-i18n="joints.detail">关节详情</h3>
                            <div class="form-group">
                                <label data-i18n="joints.nameLocal">名称 (日文)</label>
                                <input type="text" id="joint-name-local">
                            </div>
                            <div class="form-group">
                                <label data-i18n="joints.nameUniversal">名称 (英文)</label>
                                <input type="text" id="joint-name-universal">
                            </div>
                            <div class="form-group">
                                <label data-i18n="joints.type">类型</label>
                                <select id="joint-type">
                                    <option value="0">Spring 6DOF</option>
                                    <option value="1">6DOF</option>
                                    <option value="2">P2P</option>
                                    <option value="3">ConeTwist</option>
                                    <option value="4">Slider</option>
                                    <option value="5">Hinge</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label data-i18n="joints.position">位置 (X, Y, Z)</label>
                                <div class="vec3-input">
                                    <input type="number" step="0.001" id="joint-pos-x">
                                    <input type="number" step="0.001" id="joint-pos-y">
                                    <input type="number" step="0.001" id="joint-pos-z">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="viewport">
                <canvas id="viewport-canvas"></canvas>
                <div class="viewport-controls">
                    <button id="btn-wireframe" class="btn btn-small" data-i18n-title="viewport.wireframe" title="线框模式">🔲</button>
                    <button id="btn-bones-toggle" class="btn btn-small" data-i18n-title="viewport.bones" title="显示骨骼">🦴</button>
                    <button id="btn-reset-camera" class="btn btn-small" data-i18n-title="viewport.resetCamera" title="重置视角">🎯</button>
                </div>
                <div class="viewport-info">
                    <span id="viewport-fps">FPS: 0</span>
                    <span id="viewport-tris"><span data-i18n="viewport.triangles">三角面</span>: 0</span>
                </div>
            </main>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
        <p data-i18n="toolbar.loading">正在解析 PMX 文件...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
